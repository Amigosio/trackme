<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life OS Pro</title>

<style>
body {margin:0;font-family:Inter, sans-serif;background:#0b1220;color:#e2e8f0;}
.sidebar {width:220px;height:100vh;background:#020617;position:fixed;padding:20px;}
.sidebar h2 {color:#22c55e;}
.sidebar button {display:block;width:100%;margin:10px 0;padding:10px;background:#1e293b;color:white;border:none;border-radius:8px;cursor:pointer;}
.main {margin-left:240px;padding:20px;}
.card {background:rgba(255,255,255,0.05);padding:20px;border-radius:16px;margin-bottom:20px;}
input {padding:10px;margin:5px;border-radius:8px;border:none;}
button.primary {background:#22c55e;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;}
.progress-bar {background:#1e293b;border-radius:10px;overflow:hidden;margin-top:10px;}
.progress {height:10px;background:#22c55e;}
.hidden {display:none;}
</style>
</head>

<body>

<div id="loginPage" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;">
<h1>Life OS Login</h1>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
<div class="sidebar">
<h2>Life OS</h2>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('goals')">Goals</button>
<button onclick="showSection('expenses')">Expenses</button>
<button onclick="showSection('report')">Report</button>
</div>

<div class="main">

<div id="dashboard" class="section">
<div class="card">
<h2>Finance Overview</h2>
<input id="income" type="number" placeholder="Income">
<input id="expense" type="number" placeholder="Expense">
<button class="primary" onclick="addFinance()">Add</button>
<p id="summary"></p>
</div>
</div>

<div id="goals" class="section hidden">
<div class="card">
<h2>Goals</h2>
<input id="gname" placeholder="Goal">
<input id="gtarget" type="number" placeholder="Target">
<input id="gcurrent" type="number" placeholder="Current">
<button class="primary" onclick="addGoal()">Add Goal</button>
<div id="goalList"></div>
</div>
</div>

<div id="expenses" class="section hidden">
<div class="card">
<h2>Expense Story</h2>
<p id="story"></p>
</div>
</div>

<div id="report" class="section hidden">
<div class="card">
<h2>Planner Report</h2>
<button class="primary" onclick="generateReport()">Generate</button>
<pre id="reportData"></pre>
</div>
</div>

</div>
</div>

<script>
let income=0,expense=0,goals=[];

function login(){
if(user.value && pass.value){
loginPage.style.display='none';
app.classList.remove('hidden');
}
}

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

function addFinance(){
income += Number(document.getElementById('income').value||0);
expense += Number(document.getElementById('expense').value||0);
localStorage.setItem('income',income);
localStorage.setItem('expense',expense);
updateSummary();
updateStory();
}

function updateSummary(){
summary.innerText=`Income ₹${income} | Expense ₹${expense} | Savings ₹${income-expense}`;
}

function updateStory(){
story.innerText=`You earned ₹${income}. You spent ₹${expense}. You saved ₹${income-expense}. ${income-expense>0?"Good job saving!":"Overspending alert!"}`;
}

function addGoal(){
let name=gname.value;
let target=Number(gtarget.value);
let current=Number(gcurrent.value);
let percent=(current/target)*100;

let goal={name,target,current};
goals.push(goal);
localStorage.setItem('goals',JSON.stringify(goals));

let div=document.createElement('div');
div.innerHTML=`<b>${name}</b><div class='progress-bar'><div class='progress' style='width:${percent}%'></div></div>${current}/${target}`;
goallist.appendChild(div);
}

function generateReport(){
let text=`Income: ₹${income}\nExpense: ₹${expense}\nSavings: ₹${income-expense}\n\nGoals:\n`;
goals.forEach(g=>text+=`${g.name}: ${g.current}/${g.target}\n`);
reportData.innerText=text;
}

function loadData(){
income=Number(localStorage.getItem('income'))||0;
expense=Number(localStorage.getItem('expense'))||0;
goals=JSON.parse(localStorage.getItem('goals'))||[];
updateSummary();
updateStory();
}

loadData();
</script>

</body>
</html>
